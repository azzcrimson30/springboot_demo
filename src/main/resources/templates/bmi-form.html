<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>BMI Calculator</title>
</head>
<body>
<h2>Simple BMI Calculator</h2>
<form th:action="@{/calculate}" method="post">
    <label>Weight (kg):</label>
    <input type="number" step="0.1" name="weight" required><br><br>
    
    <label>Height (m):</label>
    <input type="number" step="0.01" name="height" required><br><br>
    
    <button type="submit">Calculate BMI</button>
</form>

<div th:if="${bmi}">
    <h3>Your BMI is: <span th:text="${bmi}"></span></h3>
    <h3>Category: <span th:text="${category}"></span></h3>
</div>
</body>
</html>
