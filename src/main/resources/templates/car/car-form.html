<!DOCTYPE html>
<html xmlns:th="thymeleaf.org">
<head>
    <title>Car Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <!-- Dynamic header text dependent on Insert vs Update context -->
        <h2 th:text="${car.id != null} ? '🔧 Edit Car Information' : '➕ Add New Car Information'"></h2>
        
        <form th:action="@{/cars/save}" th:object="${car}" method="POST">
            <!-- Hidden input stores ID string for updates -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label>Brand Name:</label>
                <input type="text" th:field="*{brand}" class="form-control" required placeholder="e.g. Toyota" />
            </div>

            <div class="form-group">
                <label>Model Variant:</label>
                <input type="text" th:field="*{model}" class="form-control" required placeholder="e.g. Camry" />
            </div>

            <div class="form-group">
                <label>Body Type:</label>
                <input type="text" th:field="*{type}" class="form-control" required placeholder="e.g. Sedan" />
            </div>

            <div class="form-group">
                <label>Retail Price ($):</label>
                <input type="number" step="0.01" th:field="*{price}" class="form-control" required placeholder="e.g. 25000.00" />
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Car</button>
                <a th:href="@{/cars}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
